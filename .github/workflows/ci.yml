name: Integration Test (Docker)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate-action:
    name: Validate Docker Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove any leftover failure marker
        run: rm -f examples/test-compilation/failed

      - name: Run a test command inside the container
        uses: ./
        with:
          rust_version: '1.95.0'
          cargo_lambda_version: '1.9.1'
          command: |
            set +e
            cd examples/test-compilation/ || exit 1
            ls -lah
            bash -c "[ -f \"$PWD/examples/test-compilation/failed\" ] && echo \"WTF\""
            echo "Starting Compilation"
            cargo lambda -V
            cargo lambda build --release --output-format zip > /dev/null 2> out.log
            BUILD_EXIT=$?

            if [ $BUILD_EXIT -eq 0 ]; then
              {
                printf "# Compiled successfully\n"
                printf "<details><summary>Output:</summary>\n<pre>\n"
                sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' out.log
                printf "</pre>\n</details>\n"
              } >> "$GITHUB_STEP_SUMMARY"
              rm -f failed
              [ -f failed ] && rm -f "$(pwd)/failed"
            else
              {
                printf "# Failed with error\n"
                printf "<pre>\n"
                sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' out.log
                printf "</pre>\n"
              } >> "$GITHUB_STEP_SUMMARY"
              echo "Compilation failed" > failed
            fi

      - name: Archive production artifacts
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: lambda-target-zip
          path: |
            examples/test-compilation/target/lambda/test-compilation/

      - name: Echo output on ACT
        if: ${{ env.GITHUB_ACTIONS_RUNNER == 'act' }}
        run: echo "$GITHUB_STEP_SUMMARY"

      - name: Fail job if flag exists
        run: bash -c "[ -f \"$PWD/examples/test-compilation/failed\" ] && exit 1"